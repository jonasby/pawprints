name: Deploy PawPrints to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: 619f3646-cb96-4699-a283-7cf276be42ee
  AZURE_TENANT_ID: 86447cc8-41de-4a89-b777-2f7a3ffdc1a3
  AZURE_SUBSCRIPTION_ID: 6d4154fe-9792-481f-9ecd-aa69f09e0074
  AZURE_WEBAPP_NAME: pawprints-api-6d4154

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Test frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Test API
        run: dotnet test PawPrints.sln --configuration Release

      - name: Prepare API wwwroot with SPA assets
        run: |
          rm -rf backend/PawPrints.Api/wwwroot
          mkdir -p backend/PawPrints.Api/wwwroot
          cp -r dist/. backend/PawPrints.Api/wwwroot/

      - name: Publish API + SPA
        run: dotnet publish backend/PawPrints.Api/PawPrints.Api.csproj --configuration Release --output api-publish

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: api-publish
