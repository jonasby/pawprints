<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawPrints</title>
    <link rel="icon" href="./src/pawprints-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
    <script>
      if (window.location.hostname === "jonasby.github.io") {
        window.location.replace("https://pawprints-api-6d4154.azurewebsites.net/");
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="brand">
          <img class="brand-mark" src="./src/pawprints-logo.svg" alt="" />
          <div>
            <p class="eyebrow">Puppy tracker</p>
            <h1 id="app-title">PawPrints</h1>
          </div>
        </div>
        <div class="auth-bar" data-app-section hidden>
          <form action="/api/auth/logout" method="post" data-auth-url="/api/auth/logout">
            <button type="submit">Sign out</button>
          </form>
          <span data-sync-status aria-live="polite"></span>
        </div>
      </section>

      <section class="card login-facade" data-login-panel aria-labelledby="login-title">
        <h2 id="login-title">Sign in to PawPrints</h2>
        <p>Your puppy log is private. Sign in with Google to sync it securely.</p>
        <a class="primary-link" href="/api/auth/login" data-auth-url="/api/auth/login">
          Sign in with Google
        </a>
        <p class="sync-status" data-login-status aria-live="polite"></p>
      </section>

      <section class="card settings" aria-labelledby="settings-title" data-app-section hidden>
        <div class="section-heading">
          <h2 id="settings-title">Day</h2>
          <div class="day-nav" aria-label="Log day navigation">
            <button class="day-nav-button" type="button" data-previous-day aria-label="Previous day">
              -
            </button>
            <p class="log-summary" data-log-summary></p>
            <button class="day-nav-button" type="button" data-next-day aria-label="Next day">
              +
            </button>
          </div>
        </div>
        <details class="setup-panel" data-setup-panel>
          <summary>
            <span>Setup</span>
            <span class="setup-status" data-setup-status></span>
          </summary>
          <div class="settings-grid">
            <label class="field">
              <span>Log date</span>
              <input type="date" data-log-date />
            </label>
            <label class="field">
              <span>Arrival date</span>
              <input type="date" data-arrival-date required />
            </label>
            <label class="field">
              <span>Birth date</span>
              <input type="date" data-birth-date required />
            </label>
          </div>
        </details>
      </section>

      <section class="card recorder" aria-labelledby="record-event-title" data-app-section data-activity-section hidden>
        <div class="section-heading">
          <h2 id="record-event-title">Add event</h2>
          <p class="add-status" data-add-status aria-live="polite"></p>
        </div>
        <div
          id="event-buttons"
          class="event-buttons"
          data-event-buttons
          aria-label="Puppy event buttons"
        ></div>
      </section>

      <section class="card history" aria-labelledby="today-events-title" data-app-section data-activity-section hidden>
        <div class="section-heading">
          <h2 id="today-events-title">Log</h2>
        </div>
        <ol id="event-list" class="event-list" data-event-list></ol>
        <p id="empty-state" class="empty-state" data-empty-state>
          No events yet for this day.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
