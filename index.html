<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawPrints</title>
    <link rel="icon" href="./src/pawprints-icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div class="brand">
          <img class="brand-mark" src="./src/pawprints-logo.svg" alt="" />
          <div>
            <p class="eyebrow">Puppy tracker</p>
            <h1 id="app-title">PawPrints</h1>
          </div>
        </div>
        <p class="subtitle">Tap an event. Adjust the time inline.</p>
      </section>

      <section class="card settings" aria-labelledby="settings-title">
        <div class="section-heading">
          <h2 id="settings-title">Day</h2>
          <p class="log-summary" data-log-summary></p>
        </div>
        <div class="settings-grid">
          <label class="field">
            <span>Log date</span>
            <input type="date" data-log-date />
          </label>
          <label class="field">
            <span>Arrival date</span>
            <input type="date" data-arrival-date />
          </label>
          <label class="field">
            <span>Birth date</span>
            <input type="date" data-birth-date />
          </label>
        </div>
      </section>

      <section class="card recorder" aria-labelledby="record-event-title">
        <div class="section-heading">
          <h2 id="record-event-title">Add event</h2>
          <p class="add-status" data-add-status aria-live="polite"></p>
        </div>
        <div
          id="event-buttons"
          class="event-buttons"
          data-event-buttons
          aria-label="Puppy event buttons"
        ></div>
      </section>

      <section class="card history" aria-labelledby="today-events-title">
        <div class="section-heading">
          <h2 id="today-events-title">Log</h2>
        </div>
        <ol id="event-list" class="event-list" data-event-list></ol>
        <p id="empty-state" class="empty-state" data-empty-state>
          No events yet for this day.
        </p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
